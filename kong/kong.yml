_format_version: "3.0"
_transform: true

services:
  - name: event-service
    url: https://personal-fptjqc79.outsystemscloud.com/ESDTicketBookingServices/rest/EventService/events
    routes:
      - name: event-routes
        paths:
          - /api/events
        strip_path: true

  - name: event-detail-service
    url: https://personal-fptjqc79.outsystemscloud.com/ESDTicketBookingServices/rest/EventService
    routes:
      - name: event-detail-routes
        paths:
          - /api/event
        strip_path: true

  - name: booking-service
    url: http://booking:5002/bookings
    routes:
      - name: booking-routes
        paths:
          - /api/bookings
        strip_path: true

  - name: seat-service
    url: http://seat:5003/seats
    routes:
      - name: seat-routes
        paths:
          - /api/seats
        strip_path: true

  - name: payment-service
    url: http://payment:5004/payments
    routes:
      - name: payment-routes
        paths:
          - /api/payments
        strip_path: true

  - name: notification-service
    url: http://notification:5005/notifications
    routes:
      - name: notification-routes
        paths:
          - /api/notifications
        strip_path: true

  - name: ticket-service
    url: http://ticket:5006/tickets
    routes:
      - name: ticket-routes
        paths:
          - /api/tickets
        strip_path: true

  - name: waitlist-service
    url: http://waitlist:5007/waitlist
    routes:
      - name: waitlist-routes
        paths:
          - /api/waitlist
        strip_path: true

  - name: charging-service
    url: http://charging:5008/fees
    routes:
      - name: charging-routes
        paths:
          - /api/charging
        strip_path: true

  - name: orchestrator-service
    url: http://booking_orchestrator:5010
    routes:
      - name: orchestrator-routes
        paths:
          - /api/orchestrator
        strip_path: true

  - name: orchestrator-sagas-service
    url: http://booking_orchestrator:5010/sagas
    routes:
      - name: orchestrator-sagas-routes
        paths:
          - /api/sagas
        strip_path: true

plugins:
  - name: rate-limiting
    config:
      second: 10
      policy: local
  - name: cors
    config:
      origins:
        - "http://localhost:5173"
        - "http://localhost:5174"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Content-Type
        - X-Correlation-ID
        - Accept
      credentials: false
      max_age: 3600
