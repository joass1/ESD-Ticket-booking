        - error
        - refund_amount
        - event_id
      properties:
        booking_id:
          type: integer
          description: Booking whose refund failed
          example: 5001
        error:
          type: string
          description: Error message from the last Stripe attempt
          example: "Stripe error: card_declined"
        refund_amount:
          type: number
          format: float
          description: Amount that could not be refunded
          example: 237.50
        event_id:
          type: integer
          description: Event associated with the booking
          example: 42

    WaitlistPromotedPayload:
      type: object
      required:
        - entry_id
        - event_id
        - user_id
        - email
        - seat_id
        - promotion_expires_at
      properties:
        entry_id:
          type: integer
          description: Waitlist entry that was promoted
          example: 77
        event_id:
          type: integer
          description: Event the user is waitlisted for
          example: 42
        user_id:
          type: string
          description: Promoted user
          example: "usr_abc123"
        email:
          type: string
          format: email
          description: User email for promotion notification
          example: "user@example.com"
        phone:
          type:
            - string
            - "null"
          description: User phone number (null when not provided)
          example: "+6591234567"
        seat_id:
          type: integer
          description: Seat offered to the user
          example: 1001
        section:
          type:
            - string
            - "null"
          description: Section name (null when not applicable)
          example: "VIP"
        promotion_expires_at:
          type: string
          format: date-time
          description: ISO 8601 deadline to complete payment
          example: "2026-04-06T15:30:00Z"

    WaitlistExpiredPayload:
      type: object
      required:
        - entry_id
        - event_id
        - user_id
        - email
      properties:
