        user_id:
          type: string
          description: User whose promotion expired
          example: "usr_abc123"
        email:
          type: string
          format: email
          description: User email for expiration notification
          example: "user@example.com"

  # ── Queue Bindings Reference ────────────────
  # AsyncAPI 2.6.0 does not have first-class queue objects, so the
  # mapping is documented here for implementers.
  #
  # Queue                          Exchange           Binding Key(s)                                       Durable  Prefetch  Ack
  # ─────────────────────────────  ─────────────────  ───────────────────────────────────────────────────── ───────  ────────  ────
  # event_availability_queue       seat_topic         seat.availability.updated                             yes      10       manual
  # booking_cancel_queue           event_lifecycle    event.cancelled.*                                     yes      10       manual
  # booking_refund_complete_queue  refund_topic       refund.completed                                      yes      10       manual
  # seat_reserve_queue             seat_topic         seat.reserve.request                                  yes      10       manual
  # seat_release_queue             seat_topic         seat.release.request                                  yes      10       manual
  # seat_cancel_queue              event_lifecycle    event.cancelled.*                                     yes      10       manual
  # payment_refund_queue           refund_direct      refund.process                                        yes      10       manual
  # notification_booking_queue     booking_topic      booking.confirmed, booking.timeout,                   yes      10       manual
  #                                                   booking.refund.requested
  # notification_waitlist_queue    waitlist_topic     waitlist.promoted, waitlist.expired                    yes      10       manual
  # notification_lifecycle_queue   event_lifecycle    event.cancelled.*                                     yes      10       manual
  # notification_refund_queue      refund_topic       refund.completed                                      yes      10       manual
  # ticket_queue                   booking_topic      booking.confirmed                                     yes      10       manual
  # ticket_cancel_queue            event_lifecycle    event.cancelled.*                                     yes      10       manual
  # waitlist_queue                 seat_topic         seat.released.*                                       yes      10       manual
  # waitlist_confirm_queue         seat_topic         seat.reserve.confirmed, seat.reserve.failed           yes      10       manual
  # waitlist_cancel_queue          event_lifecycle    event.cancelled.*                                     yes      10       manual
  # charging_refund_queue          booking_topic      booking.refund.requested                               yes      10       manual
